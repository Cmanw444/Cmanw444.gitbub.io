<!DOCTYPE html>
<html>
<head>
  <title>Forsaken Terminal</title>
  <style>
    /* CMD-style terminal */
    body {
      margin: 0;
      padding: 0;
      background: black;
      font-family: monospace;
      color: #00ff00;
    }

    #terminal {
      width: 90%;
      max-width: 1000px;
      margin: 50px auto;
      padding: 20px;
      border: 2px solid #00ff00;
      height: 70vh;
      overflow-y: auto;
      box-sizing: border-box;
    }

    #inputLine {
      display: flex;
      align-items: center;
    }

    #inputLine span {
      margin-right: 5px;
    }

    #commandInput {
      background: black;
      color: #00ff00;
      border: none;
      outline: none;
      flex: 1;
      font-family: monospace;
      font-size: 16px;
    }

    .message {
      margin-bottom: 10px;
    }

    /* Locked file text */
    .locked {
      color: #ff5555;
    }

    /* Optional blink cursor */
    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0; }
      100% { opacity: 1; }
    }

    #cursor {
      display: inline-block;
      width: 10px;
      background: #00ff00;
      margin-left: 2px;
      animation: blink 1s infinite;
    }

    /* Scrollbar style for immersion */
    #terminal::-webkit-scrollbar {
      width: 8px;
    }

    #terminal::-webkit-scrollbar-thumb {
      background: #00ff00;
    }
  </style>
</head>
<body>
  <div id="terminal">
    <div class="message">Welcome to Forsaken Terminal v1.0</div>
    <div class="message">Type the password to unlock files:</div>
    <div id="inputLine">
      <span>C:\></span>
      <input type="text" id="commandInput" autocomplete="off" />
      <span id="cursor"></span>
    </div>
    <div id="output"></div>
  </div>

  <script>
    const password = "iceknight.Password = Poison Ivy90012";
    const input = document.getElementById("commandInput");
    const output = document.getElementById("output");

    // Files (can expand later)
    const files = [
      { name: "log_01.txt", path: "logs/log_01.txt", type: "text" },
      { name: "report_01.txt", path: "reports/report_01.txt", type: "text" },
      { name: "secret_video.mp4", path: "media/video_01.mp4", type: "video" }
    ];

    input.focus();

    input.addEventListener("keydown", function(e) {
      if(e.key === "Enter") {
        const command = input.value.trim();
        if(command === password){
          output.innerHTML += `<div class="message">Password accepted! Files unlocked:</div>`;
          files.forEach(file => {
            if(file.type === "text"){
              output.innerHTML += `<div class="message">- <span class="locked">${file.name}</span></div>`;
            } else if(file.type === "video"){
              output.innerHTML += `<div class="message">- <span class="locked">??? (video)</span></div>`;
            }
          });
          // Add click event to show text files
          setTimeout(() => showFiles(), 100);
        } else {
          output.innerHTML += `<div class="message">Invalid password. Try again.</div>`;
        }
        input.value = "";
        terminal.scrollTop = terminal.scrollHeight;
      }
    });

    function showFiles() {
      files.forEach(file => {
        if(file.type === "text"){
          const div = document.createElement("div");
          div.className = "message";
          div.innerHTML = `<span class="locked">${file.name}</span>`;
          div.style.cursor = "pointer";
          div.onclick = () => fetch(file.path)
            .then(r => r.text())
            .then(t => alert(t));
          output.appendChild(div);
        } else if(file.type === "video"){
          const div = document.createElement("div");
          div.className = "message";
          div.innerHTML = `<span class="locked">??? (video)</span>`;
          div.style.cursor = "pointer";
          div.onclick = () => {
            const videoWin = window.open("", "_blank");
            videoWin.document.write(`<video width="640" controls autoplay><source src="${file.path}" type="video/mp4"></video>`);
          };
          output.appendChild(div);
        }
      });
    }
  </script>
</body>
</html>
